<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>League of Code — Competitive Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <header>
    <div class="header-left">
      <a href="https://www.leaguesofcode.com/" class="logo">
        <img src="logo.svg" alt="Leagues of Code" width="36" height="36"/>
        <span class="logo-text">Leagues of Code</span>
      </a>
    </div>
    <div class="header-right">
      <div class="user-pill" id="userPill">
        <div class="avatar-dot"></div>
        <span id="userNameDisplay">alex_coder</span>
        <button class="logout-btn" id="logoutBtn">×</button>
      </div>
      <button class="login-btn" id="loginBtn" style="display:none;">Log In</button>
    </div>
  </header>

  <main>

    <!-- HEATMAP: lives outside tabs, always visible when logged in -->
    <div class="heatmap-container" id="heatmapSection">
      <div class="heatmap-label">
        <span class="hm-title">YOUR ACTIVITY</span>
        <span class="hm-sub" id="heatmapYear">2025</span>
      </div>
      <div class="heatmap-months" id="heatmapMonths"></div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
      <div class="heatmap-legend">
        <span>Less</span>
        <div class="legend-cells" id="legendCells"></div>
        <div></div>
        <span>More</span>
      </div>
    </div>

    <!-- STUDENTS TAB -->
    <section id="tab-students" class="tab-section active">
      <div class="section-header">
        <h1>Student Rankings</h1>
        <div class="section-controls">
          <div class="select-wrap">
            <select id="groupFilter">
              <option value="all">All Groups</option>
            </select>
            <svg class="select-arrow" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </div>
        <div class="total-count" id="studentCount">— students</div>
      </div>
      <div class="board-container">
        <div class="board-header-row">
          <span class="col-rank">#</span>
          <span class="col-name">Student</span>
          <span class="col-group">Group</span>
          <span class="col-progress">Progress</span>
          <span class="col-total">Total Solved</span>
        </div>
        <div id="studentBoard"></div>
        <div class="pagination" id="studentPagination"></div>
      </div>
    </section>

  </main>

  <!-- Floating tooltip for heatmap -->
  <div class="hm-tooltip" id="hmTooltip"></div>
  <!-- Floating tooltip for progress bar segments -->
  <div class="prog-tooltip" id="progTooltip"></div>

  <!-- Login modal -->
  <div class="modal-overlay" id="loginModal">
    <div class="modal">
      <button class="modal-close" id="modalClose">×</button>
      <h2>Sign In</h2>
      <p class="modal-sub">Choose a demo user to log in</p>
      <div class="demo-users" id="demoUsers"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
